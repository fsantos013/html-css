<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="development.ico" type="image/x-icon">
    <title>Videos com HTML5</title>
</head>
<body>
    <h1>Inserindo Videos Hospedados Localmente</h1>
    <p>Este video está hospedado no meu próprio servidor.</p>
    <video width="560" height="315" controls>
        <source src="midias/scottie-barnes.webm.webm" type="video/webm">
        <source src="midias/scottie-barnes.m4v.mp4" type="video/m4v">
        <source src="midias/scottie-barnes.mp4.mp4" type="video/mp4">
        <p>Seu navegador não tem compatibilidade com reprodução de videos.</p>

    </video>

    <h1>Inserindo Videos do YouTube</h1>

    <iframe width="560" height="315" src="https://www.youtube.com/embed/_RqteZDjDmQ?si=CvQwJFZqTGNSmZHN" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
    
    <h1>Inserindo videos do vimeo</h1>
    <iframe src="https://player.vimeo.com/video/197817555?badge=0&amp;autopause=0&amp;player_id=0&amp;app_id=58479" width="560" height="315" frameborder="0" allow="autoplay; fullscreen; picture-in-picture; clipboard-write; encrypted-media; web-share" referrerpolicy="strict-origin-when-cross-origin" title="Animation Reel 2017"></iframe>
</body>
</html>
